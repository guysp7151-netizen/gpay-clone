services:
  - type: web
    name: gpay-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gpay-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: gpay-db
    plan: free
